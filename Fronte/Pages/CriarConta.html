<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | InfinitIA</title>
    <link rel="icon" href="/Images/infinity.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../Style/CriarConta/CriarConta.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <button class="back-btn" onclick="redirectTo('/Pages/login.html')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Voltar
            </button>

            <div class="signup-header">
                <img src="../Images/infinity.svg" alt="InfinitIA Logo" class="logo">
                <h1>Criar conta gratuita</h1>
                <p>Junte-se à milhares de estudantes</p>
            </div>

            <form id="signupForm" class="signup-form">
                <div class="input-group">
                    <label for="fullName">Nome completo</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Digite seu nome completo" 
                        required
                    >
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu@email.com" 
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Crie uma senha" 
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"></div>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirmar senha</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirme sua senha" 
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- Termos e Condições -->
                <div class="terms-group">
                    <label class="terms-checkbox">
                        <input type="checkbox" id="terms" required>
                        <span>Li e aceito os <a href="/Pages/Termos.html" target="_blank">Termos de Uso</a> e <a href="/Pages/Privacidade.html" target="_blank">Política de Privacidade</a></span>
                    </label>
                </div>

                <!-- Botão de Cadastro -->
                <button type="submit" class="signup-btn" id="submitSignup">
                    Criar conta
                </button>

                <!-- Link para Login -->
                <div class="login-link">
                    <p>Já tem uma conta?</p>
                    <button type="button" onclick="redirectTo('/Pages/login.html')" class="login-redirect-btn">
                        Fazer login
                    </button>
                </div>
            </form>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="loading-spinner"></div>
            <p>Criando sua conta...</p>
        </div>

        <!-- Toast de Notificação -->
        <div id="toast" class="toast hidden">
            <span id="toastMessage"></span>
        </div>
    </div>

    <!-- Primeiro carrega as configurações, depois o script -->
    <script src="../Javascript/config.js"></script>
    <script src="../Javascript/auth.js"></script>
    <script src="../Javascript/CriarConta/CriarConta.js"></script>
</body>
</html>
